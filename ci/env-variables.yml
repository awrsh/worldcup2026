# Manifest for ENV_VARIABLES_LIST_PATH (gradian-app).
# Top-level keys = GitLab CI/CD variable NAMES (values come from CI/CD settings).
#
# scope (combine per variable; processed by ci-templates env_variables_list_script.yml):
#   build    → docker build --build-arg (only when Dockerfile declares matching ARG).
#   envfile  → written to project/.env in the build job (Dockerfile: COPY .env before npm run build).
#              Use for NEXT_PUBLIC_* and other vars needed at `next build` but NOT listed as ARG.
#   runtime  → written to deploy .env (docker compose variable substitution + container env).

NEXT_PUBLIC_APP_BASE_URL:
  scope:
    - build
    - envfile
    - runtime

NEXT_PUBLIC_API_URL:
  scope:
    - build
    - envfile
    - runtime
